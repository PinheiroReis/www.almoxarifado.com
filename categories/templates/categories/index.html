<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Categories Page</title>
	</head>
	<body>
		{% if categories %}
		<h1>Categorias</h1>
		<ul>
			{% for category in categories %}
			<li>
				<a href="{% url 'categories:details' category.id %}"
					>{{ category }}</a
				>
			</li>
			{% endfor %}
		</ul>
		{% else %}
		<p>No categories are available.</p>
		{% endif %}
	</body>
</html>

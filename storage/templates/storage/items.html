<!DOCTYPE html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Storage Items Page</title>
	</head>
	<body>
		{% for item in items %}
		<ul>
			<p>N° de Identificação: {{ item.id}}</p>
			<p>Nome: {{ item.name }}</p>
			<p>Descrição: {{ item.description}}</p>
		</ul>
		{% endfor %}
	</body>
</html>

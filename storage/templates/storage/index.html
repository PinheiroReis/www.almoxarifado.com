{% if categories_list %}

<ul>
	{% for category in categories_list %}

	<li><a href="category/{{category.id}}/">{{category}}</a></li>

	{% endfor %}
</ul>

{% else %}

<p>No categories are avaible.</p>

{% endif %} {% if items_list %}

<ul>
	{% for item in items_list %}

	<li><a href="item/{{item.id}}/">{{item}}</a></li>

	{% endfor %}
</ul>

{% else %}

<p>No items are avaible.</p>

{% endif %}
